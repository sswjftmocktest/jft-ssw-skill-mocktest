<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Info - JFT & SSW Mock Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#12294B;
    --navy-deep:#0A1930;
    --paper:#F5F2EA;
    --slate:#5A6472;
    --crimson:#BC002D;
    --line:#D8D3C4;
    --success:#1E7145;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 10% 10%, rgba(18,41,75,0.04) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(188,0,45,0.04) 0%, transparent 40%);
    font-family:'Inter','Noto Sans Bengali',sans-serif;
    color:var(--navy-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 16px;
  }

  .screen{display:none;}
  .screen.active{display:block;}

  /* ---------- FORM CARD ---------- */
  .card{
    background:#fff;
    border:1px solid var(--line);
    box-shadow:0 1px 3px rgba(18,41,75,0.06), 0 8px 24px rgba(18,41,75,0.10);
    max-width:460px;
    width:100%;
    margin:0 auto;
  }
  .card-header{
    background:var(--navy);
    color:#fff;
    padding:22px 24px 18px;
    position:relative;
    overflow:hidden;
  }
  .card-header::after{
    content:"";
    position:absolute;
    right:-30px; top:-30px;
    width:110px; height:110px;
    background:var(--crimson);
    opacity:0.15;
    border-radius:50%;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:#C9D3E0;
    font-weight:600;
    margin-bottom:6px;
  }
  .h-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:21px;
    font-weight:700;
  }

  .card-body{padding:22px 24px 26px;}

  .field-group{margin-bottom:16px;}
  .field-label{
    font-size:12.5px;
    font-weight:600;
    color:var(--navy);
    margin-bottom:6px;
    display:block;
  }
  input[type=text],input[type=date]{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--line);
    background:#FBFAF7;
    font-size:14.5px;
    font-family:'Inter',sans-serif;
    color:var(--navy-deep);
  }
  input:focus{outline:none; border-color:var(--navy); background:#fff;}
  input[readonly]{background:#EFEBE1; color:var(--slate);}

  select{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--line);
    background:#FBFAF7;
    font-size:14.5px;
    font-family:'Inter',sans-serif;
    color:var(--navy-deep);
  }
  select:focus{outline:none; border-color:var(--navy); background:#fff;}

  .consent-row{
    display:flex;
    align-items:flex-start;
    gap:10px;
    background:#F8F6F0;
    border:1px solid var(--line);
    padding:12px 14px;
    margin-bottom:18px;
  }
  .consent-row input{margin-top:3px; width:18px; height:18px; flex-shrink:0;}
  .consent-row label{font-size:13px; color:var(--navy-deep); line-height:1.5;}

  .photo-box{
    border:1.5px dashed var(--line);
    background:#FBFAF7;
    padding:18px;
    text-align:center;
    margin-bottom:8px;
  }
  .photo-preview{
    width:120px; height:120px;
    object-fit:cover;
    border:2px solid var(--navy);
    margin:0 auto 12px;
    display:none;
  }
  .photo-icon{font-size:34px; margin-bottom:8px;}
  .photo-btn{
    display:inline-block;
    padding:9px 18px;
    background:var(--navy);
    color:#fff;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    border:none;
  }
  .photo-hint{font-size:11.5px; color:var(--slate); margin-top:8px;}

  .submit-btn{
    width:100%;
    padding:13px;
    background:var(--crimson);
    color:#fff;
    border:none;
    font-size:14.5px;
    font-weight:700;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    margin-top:6px;
    letter-spacing:0.02em;
  }
  .submit-btn:disabled{background:#B9AFA3; cursor:not-allowed;}
  .submit-btn:active:not(:disabled){transform:translateY(1px);}

  .err-msg{
    font-size:12px;
    color:var(--crimson);
    margin-top:10px;
    display:none;
  }
  .err-msg.show{display:block;}

  /* ---------- LOADING SCREEN ---------- */
  .loading-screen{
    text-align:center;
    max-width:380px;
  }
  .loading-count{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:64px;
    font-weight:700;
    color:var(--navy);
    line-height:1;
    margin-bottom:18px;
  }
  .loading-label{
    font-size:15px;
    font-weight:600;
    color:var(--navy-deep);
    margin-bottom:6px;
  }
  .loading-sub{
    font-size:12.5px;
    color:var(--slate);
  }
  .loading-bar-track{
    width:100%;
    height:6px;
    background:var(--line);
    margin-top:22px;
    overflow:hidden;
  }
  .loading-bar-fill{
    height:100%;
    width:0%;
    background:var(--crimson);
    transition:width 1s linear;
  }
</style>
</head>
<body>

<!-- ===================== SCREEN 1: CANDIDATE INFO FORM ===================== -->
<div class="screen active" id="screenForm">
  <div class="card">
    <div class="card-header">
      <div class="eyebrow">Step 2 of 3</div>
      <div class="h-title">প্রার্থীর তথ্য</div>
    </div>
    <div class="card-body">

      <div class="field-group">
        <label class="field-label">氏名（フルネーム）<br>পূর্ণ নাম</label>
        <input type="text" id="fullName" placeholder="あなたの氏名を入力してください / আপনার পূর্ণ নাম লিখুন">
      </div>

      <div class="field-group">
        <label class="field-label">生年月日<br>জন্ম তারিখ (Date of Birth)</label>
        <div style="display:flex; gap:8px;">
          <select id="dobDay">
            <option value="">দিন</option>
          </select>
          <select id="dobMonth" style="flex:1.3;">
            <option value="">মাস</option>
            <option value="01">জানুয়ারি</option>
            <option value="02">ফেব্রুয়ারি</option>
            <option value="03">মার্চ</option>
            <option value="04">এপ্রিল</option>
            <option value="05">মে</option>
            <option value="06">জুন</option>
            <option value="07">জুলাই</option>
            <option value="08">আগস্ট</option>
            <option value="09">সেপ্টেম্বর</option>
            <option value="10">অক্টোবর</option>
            <option value="11">নভেম্বর</option>
            <option value="12">ডিসেম্বর</option>
          </select>
          <select id="dobYear">
            <option value="">সাল</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">性別<br>লিঙ্গ (Gender)</label>
        <select id="gender">
          <option value="">বেছে নিন</option>
          <option value="Male">Male / পুরুষ</option>
          <option value="Female">Female / নারী</option>
          <option value="Other">Other / অন্যান্য</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label">試験日<br>Exam তারিখ (Exam Date)</label>
        <input type="text" id="examDate" readonly>
      </div>

      <div class="field-group">
        <label class="field-label">電話番号<br>ফোন নম্বর (Phone Number)</label>
        <input type="text" id="phone" inputmode="numeric" placeholder="電話番号を入力してください / আপনার ফোন নম্বর লিখুন">
      </div>

      <div class="field-group">
        <label class="field-label">写真（あなたの写真）<br>আপনার ছবি</label>
        <div class="photo-box">
          <img id="photoPreview" class="photo-preview" alt="Preview">
          <div id="photoIcon" class="photo-icon">📷</div>
          <input type="file" id="photoInput" accept="image/*" capture="user" style="display:none">
          <button type="button" class="photo-btn" onclick="document.getElementById('photoInput').click()">ছবি তুলুন</button>
          <div class="photo-hint">ক্যামেরা দিয়ে স্পষ্ট ছবি তুলুন</div>
        </div>
      </div>

      <div class="consent-row">
        <input type="checkbox" id="consentBox">
        <label for="consentBox">আমি নিশ্চিত করছি যে উপরের তথ্য সঠিক এবং আমি এই Mock Test দিতে সম্মত আছি।</label>
      </div>

      <button type="button" class="submit-btn" id="startBtn" onclick="validateAndStart()">Exam শুরু করুন</button>
      <div class="err-msg" id="formErr"></div>
    </div>
  </div>
</div>

<!-- ===================== SCREEN 2: LOADING / COUNTDOWN ===================== -->
<div class="screen" id="screenLoading">
  <div class="loading-screen">
    <div class="loading-count" id="countNum">10</div>
    <div class="loading-label" id="loadingLabel">তথ্য পাঠানো হচ্ছে...</div>
    <div class="loading-sub">অনুগ্রহ করে অপেক্ষা করুন, পেজ বন্ধ করবেন না</div>
    <div class="loading-bar-track"><div class="loading-bar-fill" id="loadBar"></div></div>
  </div>
</div>

<script>
  // Apps Script Web App URL (same one used in login-2.html)
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoVENO6ArlVOtfv_xXjY7-45SaYl5gWBonjMqBJ0jOCm8iaJ4TQ88js7G5BwpSd_gM/exec";

  // Maps each category name (must match home-1.html card names exactly) to its exam file
  const examFileMap = {
    'JFT Basic': 'jft_mock_test.htm',
    'Construction (Civil Engineering)': 'construction_civil_mock_test.htm',
    'Construction (Building Construction)': 'construction_building_mock_test.htm',
    'Construction (Lifeline / Equipment)': 'construction_lifeline_mock_test.htm',
    'Agriculture (Crop Farming)': 'agriculture_crop_mock_test.htm',
    'Agriculture (Livestock Farming)': 'agriculture_livestock_mock_test.htm',
    'Nursing Care (Japanese)': 'nursing_japanese_mock_test.htm',
    'Nursing Care (Bangla)': 'nursing_bangla_mock_test.htm',
    'Accommodation / Hotel': 'accommodation_mock_test.htm',
    'Automobile Maintenance': 'automobile_mock_test.htm',
    'Aviation': 'aviation_mock_test.htm',
    'Truck Driver': 'truck_driver_mock_test.htm'
  };

  let capturedPhoto = null;

  // Populate Day (1-31) and Year (currentYear-15 down to currentYear-70) dropdowns
  (function populateDobDropdowns(){
    const dayEl = document.getElementById('dobDay');
    for(let d = 1; d <= 31; d++){
      const opt = document.createElement('option');
      opt.value = String(d).padStart(2,'0');
      opt.textContent = d;
      dayEl.appendChild(opt);
    }
    const yearEl = document.getElementById('dobYear');
    const thisYear = new Date().getFullYear();
    for(let y = thisYear - 15; y >= thisYear - 70; y--){
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      yearEl.appendChild(opt);
    }
  })();

  function getDobValue(){
    const d = document.getElementById('dobDay').value;
    const m = document.getElementById('dobMonth').value;
    const y = document.getElementById('dobYear').value;
    if(!d || !m || !y) return '';
    return y + '/' + m + '/' + d;
  }

  // Auto-fill Exam Date with today's date
  (function setExamDate(){
    const today = new Date();
    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yyyy = today.getFullYear();
    document.getElementById('examDate').value = yyyy + '/' + mm + '/' + dd;
    sessionStorage.setItem('examDate', yyyy + '/' + mm + '/' + dd);
  })();

  document.getElementById('photoInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt){
      capturedPhoto = evt.target.result; // base64 data URL
      const img = document.getElementById('photoPreview');
      img.src = capturedPhoto;
      img.style.display = 'block';
      document.getElementById('photoIcon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  function validateAndStart(){
    const name = document.getElementById('fullName').value.trim();
    const dob = getDobValue();
    const gender = document.getElementById('gender').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const consent = document.getElementById('consentBox').checked;
    const errBox = document.getElementById('formErr');
    const startBtn = document.getElementById('startBtn');

    errBox.classList.remove('show');

    if(!name){
      errBox.textContent = 'অনুগ্রহ করে আপনার পূর্ণ নাম লিখুন।';
      errBox.classList.add('show');
      return;
    }
    if(!dob){
      errBox.textContent = 'অনুগ্রহ করে আপনার জন্ম তারিখ দিন।';
      errBox.classList.add('show');
      return;
    }
    if(!gender){
      errBox.textContent = 'অনুগ্রহ করে লিঙ্গ বেছে নিন।';
      errBox.classList.add('show');
      return;
    }
    if(!phone){
      errBox.textContent = 'অনুগ্রহ করে আপনার ফোন নম্বর লিখুন।';
      errBox.classList.add('show');
      return;
    }
    if(!capturedPhoto){
      errBox.textContent = 'অনুগ্রহ করে আপনার ছবি তুলুন।';
      errBox.classList.add('show');
      return;
    }
    if(!consent){
      errBox.textContent = 'Exam দিতে সম্মতি প্রয়োজন।';
      errBox.classList.add('show');
      return;
    }

    // Save candidate info locally too, for use on exam/result pages
    sessionStorage.setItem('candidateName', name);
    sessionStorage.setItem('candidateDOB', dob);
    sessionStorage.setItem('candidateGender', gender);
    sessionStorage.setItem('candidatePhone', phone);
    sessionStorage.setItem('candidatePhoto', capturedPhoto);

    // Switch to loading screen
    document.getElementById('screenForm').classList.remove('active');
    document.getElementById('screenLoading').classList.add('active');
    startBtn.disabled = true;

    submitToServer(name, dob, gender, phone);
  }

  function submitToServer(name, dob, gender, phone){
    const studentId = sessionStorage.getItem('studentId') || '';
    const rowIndex = sessionStorage.getItem('rowIndex') || '';
    const labelEl = document.getElementById('loadingLabel');

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "submitForm",
        id: studentId,
        rowIndex: rowIndex,
        name: name,
        dob: dob,
        gender: gender,
        phone: phone,
        photoBase64: capturedPhoto
      })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success){
        labelEl.textContent = 'তথ্য সফলভাবে সেভ হয়েছে। Exam Questions Upload হচ্ছে...';
        if(data.photoUrl){
          sessionStorage.setItem('candidatePhotoUrl', data.photoUrl);
        }
      } else {
        labelEl.textContent = 'তথ্য সেভ করতে সমস্যা হয়েছে, তবে Exam চলবে।';
      }
      startCountdown();
    })
    .catch(err => {
      console.error(err);
      labelEl.textContent = 'সার্ভার সমস্যা হয়েছে, তবে Exam চলবে।';
      startCountdown();
    });
  }

  function startCountdown(){
    let seconds = 10;
    const countEl = document.getElementById('countNum');
    const barEl = document.getElementById('loadBar');
    countEl.textContent = seconds;

    const timer = setInterval(function(){
      seconds--;
      countEl.textContent = seconds;
      barEl.style.width = ((10 - seconds) / 10 * 100) + '%';

      if(seconds <= 0){
        clearInterval(timer);
        const category = sessionStorage.getItem('category') || '';
        const examFile = examFileMap[category];
        if(examFile){
          window.location.href = examFile;
        } else {
          document.getElementById('screenLoading').innerHTML = '<div class="loading-screen"><div class="loading-label">এই ক্যাটাগরির Exam শীঘ্রই আসছে।</div><div class="loading-sub">অনুগ্রহ করে পরে আবার চেষ্টা করুন।</div></div>';
        }
      }
    }, 1000);
  }
</script>

</body>
</html>
